# Cargo configuration for Open Sesame

[alias]
xtask = "run --manifest-path xtask/Cargo.toml --"

# Mold linker is configured via CARGO_TARGET_*_LINKER and CARGO_TARGET_*_RUSTFLAGS
# environment variables in the devShell (flake.nix shellHook) and in the Nix
# package builder. This avoids breaking `cargo build` outside the devShell
# where clang/mold may not be on PATH.
