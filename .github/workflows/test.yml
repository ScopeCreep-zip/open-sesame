name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: scopecreep-zip
          authToken: ${{ secrets.SCOPE_CREEP_CACHIX_PRIVATE_KEY }}

      - name: Run tests (with raised mlock limit for ProtectedAlloc)
        run: |
          sudo prlimit --pid $$ --memlock=268435456:268435456
          nix develop --accept-flake-config -c mise run ci:test
